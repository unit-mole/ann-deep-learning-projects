name: Tabular Embedding ANN CI

on:
  push:
    paths:
      - "11-tabular-deep-learning-with-embeddings/**"
      - ".github/workflows/tabular-embedding-ci.yml"
  pull_request:
    paths:
      - "11-tabular-deep-learning-with-embeddings/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 11-tabular-deep-learning-with-embeddings

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 11-tabular-deep-learning-with-embeddings/app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest

      - name: Compile source files
        run: python -m compileall app src train_model.py

      - name: Run tests
        run: pytest -q
