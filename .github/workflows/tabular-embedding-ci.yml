name: Tabular Embedding ANN CI

on:
  push:
    paths:
      - "10-tabular-deep-learning-with-embeddings/**"
      - ".github/workflows/tabular-embedding-ci.yml"
  pull_request:
    paths:
      - "10-tabular-deep-learning-with-embeddings/**"
      - ".github/workflows/tabular-embedding-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: 10-tabular-deep-learning-with-embeddings

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 10-tabular-deep-learning-with-embeddings/app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install pytest

      - name: Compile source files
        run: python -m compileall app src train_model.py

      - name: Run tests
        run: python -m pytest tests -q
