name: Churn project tests

on:
  push:
    paths:
      - "01-churn-classification/**"
      - ".github/workflows/churn-tests.yml"
  pull_request:
    paths:
      - "01-churn-classification/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-churn-classification

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: 01-churn-classification/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest -q
