name: Dynamic Pricing CI

on:
  push:
    paths:
      - "06-dynamic-pricing-optimization/**"
      - ".github/workflows/dynamic-pricing-ci.yml"
  pull_request:
    paths:
      - "06-dynamic-pricing-optimization/**"
      - ".github/workflows/dynamic-pricing-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 06-dynamic-pricing-optimization
    env:
      KERAS_BACKEND: torch
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 06-dynamic-pricing-optimization/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Compile source
        run: python -m compileall src app
      - name: Run tests
        run: pytest -q
