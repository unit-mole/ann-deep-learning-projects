name: Handwritten Digit Recognition CI

on:
  push:
    paths:
      - "07-handwritten-digit-recognition/**"
      - ".github/workflows/handwritten-digit-recognition-ci.yml"
  pull_request:
    paths:
      - "07-handwritten-digit-recognition/**"
      - ".github/workflows/handwritten-digit-recognition-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 07-handwritten-digit-recognition

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: 07-handwritten-digit-recognition/requirements*.txt

      - name: Install application and test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install "pytest>=8,<10"

      - name: Check dependency consistency
        run: python -m pip check

      - name: Compile Python files
        run: python -m compileall app src tests streamlit_app.py

      - name: Run unit tests
        run: python -m pytest tests -q

      - name: Run model inference smoke test
        run: |
          python - <<'PY'
          from PIL import Image

          from src.image_preprocessing import preprocess_digit_image
          from src.prediction_pipeline import load_digit_model, predict_digit

          model = load_digit_model("models/digit_recognition_model.keras")
          image = Image.open("data/sample_digits/digit_7.png")
          processed = preprocess_digit_image(image)
          result = predict_digit(model, processed.model_input)

          assert result.predicted_digit == 7, (
              f"Expected digit 7, but model predicted {result.predicted_digit}."
          )
          assert len(result.probabilities) == 10
          print(
              "Inference smoke test passed:",
              result.predicted_digit,
              f"{result.confidence:.2%}",
          )
          PY
