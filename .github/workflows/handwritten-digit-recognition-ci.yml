name: Handwritten Digit Recognition CI

on:
  push:
    paths:
      - "07-handwritten-digit-recognition/**"
      - ".github/workflows/handwritten-digit-recognition-ci.yml"
  pull_request:
    paths:
      - "07-handwritten-digit-recognition/**"
      - ".github/workflows/handwritten-digit-recognition-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 07-handwritten-digit-recognition

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: 07-handwritten-digit-recognition/requirements*.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy Pillow pytest

      - name: Compile Python files
        run: python -m compileall app src tests streamlit_app.py

      - name: Run unit tests
        run: pytest -q
