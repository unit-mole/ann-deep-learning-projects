name: House Price ANN CI

on:
  push:
    branches: [main]
    paths:
      - "08-house-price-prediction/**"
      - ".github/workflows/house-price-ann-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "08-house-price-prediction/**"
      - ".github/workflows/house-price-ann-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: 08-house-price-prediction

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 08-house-price-prediction/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python source
        run: python -m compileall app src tests

      - name: Run tests
        run: pytest -q
