name: Multi-Output ANN CI

on:
  push:
    paths:
      - "09-multi-output-prediction-system/**"
      - ".github/workflows/multi-output-ann-ci.yml"
  pull_request:
    paths:
      - "09-multi-output-prediction-system/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 09-multi-output-prediction-system
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 09-multi-output-prediction-system/requirements-ci.txt
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Compile Python files
        run: python -m compileall app src tests streamlit_app.py
      - name: Run tests
        run: pytest -q
