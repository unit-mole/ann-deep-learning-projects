name: Credit Risk ANN CI

on:
  push:
    paths:
      - "03-credit-risk-probability-scoring/**"
      - ".github/workflows/credit-risk-ann-ci.yml"
  pull_request:
    paths:
      - "03-credit-risk-probability-scoring/**"
      - ".github/workflows/credit-risk-ann-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 03-credit-risk-probability-scoring

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python -m pip install numpy pandas scikit-learn joblib pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Validate Python files
        run: python -m compileall src app
