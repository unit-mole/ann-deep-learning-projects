name: Credit Risk ANN CI

on:
  push:
    paths:
      - "Credit_Risk_Probability_Scoring/**"
      - ".github/workflows/credit-risk-ann-ci.yml"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Credit_Risk_Probability_Scoring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install numpy pandas scikit-learn joblib pytest
      - run: pytest -q
      - run: python -m compileall src app
