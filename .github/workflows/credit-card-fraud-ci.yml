name: Credit Card Fraud Project CI

on:
  push:
    paths:
      - "02-credit-card-fraud-detection/**"
      - ".github/workflows/credit-card-fraud-ci.yml"

  pull_request:
    paths:
      - "02-credit-card-fraud-detection/**"
      - ".github/workflows/credit-card-fraud-ci.yml"

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 02-credit-card-fraud-detection

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn matplotlib pytest

      - name: Compile Python files
        run: python -m compileall app src tests

      - name: Run unit tests
        run: pytest -q