name: Credit Card Fraud Project CI

on:
  push:
    paths:
      - "Credit_Card_Fraud_Detection/**"
      - ".github/workflows/credit-card-fraud-ci.yml"
  pull_request:
    paths:
      - "Credit_Card_Fraud_Detection/**"
      - ".github/workflows/credit-card-fraud-ci.yml"

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Credit_Card_Fraud_Detection

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn matplotlib pytest

      - name: Compile Python files
        run: python -m compileall app src tests

      - name: Run unit tests
        run: pytest -q
